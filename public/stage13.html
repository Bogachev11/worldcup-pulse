<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>STAGE 13 · FINALIZED HUD — FRA · SEN</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Barlow (still used by 3D-canvas sprites / panels) + STAGE13 chrome fonts:
       Space Grotesk (labels/UI) + Space Mono (numerics/telemetry), matching vB2. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <!-- three.js via CDN import map (esm.sh) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.0",
      "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    body, .pnl, .hud-w, .btn, #title2, #camread, input, select, textarea, button, label, option {
      font-family: 'Barlow', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    /* STAGE11 CHANGE #4 — CENTERED ~1000px COMPOSITION COLUMN (poster/portrait).
       The full-bleed score-tinted backdrop halo sits BEHIND everything; the 3D canvas,
       HUD, goal-markers row and pulse strip all live within this centered 1000px band.
       The SETTINGS PANEL stays OUTSIDE (floating left, see #panel). */
    :root { --col-w: 1000px; }
    /* full-bleed backdrop halo (score-tinted, painted in JS updateSky) — BEHIND the column */
    #backdrop { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: #05070d; }
    /* the centered composition column */
    #composition {
      position: fixed; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
      width: var(--col-w); max-width: 100vw; z-index: 10; pointer-events: none;
    }
    /* the 3D canvas is framed to the 1000px column (sky halo stays full-bleed behind) */
    #stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; pointer-events: auto; }
    #stage:active { cursor: grabbing; }
    .pnl {
      position: fixed; z-index: 30; pointer-events: auto;
      display: flex; flex-direction: column; gap: 11px;
      background: rgba(10,12,20,0.62); border: 1px solid var(--stroke);
      border-radius: 12px; padding: 14px 16px; width: 316px;
      font-size: 13px; letter-spacing: 0.03em;
      backdrop-filter: blur(7px);
    }
    #panel { top: 14px; left: 14px; max-height: calc(100vh - 28px); overflow-y: auto; overflow-x: hidden; }
    #panel::-webkit-scrollbar { width: 9px; }
    #panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 4px; }
    #campanel { bottom: 14px; right: 14px; width: 264px; }
    .pnl .row { display: flex; align-items: center; gap: 10px; justify-content: space-between; padding: 2px 0; }
    .pnl label { color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.07em; font-size: 13px; }
    .pnl .val { min-width: 54px; text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-size: 13px; font-weight: 500; }
    #title2 { font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink); font-weight: 600; }
    #camread { min-width: auto; color: #9fd; letter-spacing: 0.06em; }

    /* ---- two-line control: label/value row, then full-width slider ---- */
    .ctl { display: flex; flex-direction: column; gap: 4px; }
    .ctl-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .ctl-head label { flex: 1; min-width: 0; }

    /* ---- BIGGER, more legible range sliders (panels only) ---- */
    .pnl input[type=range] {
      flex: 1; min-width: 0; -webkit-appearance: none; appearance: none;
      height: 20px; background: transparent; cursor: pointer; margin: 0;
    }
    .pnl input[type=range]::-webkit-slider-runnable-track {
      height: 7px; border-radius: 4px; background: rgba(255,255,255,0.14); border: 1px solid var(--stroke);
    }
    .pnl input[type=range]::-moz-range-track {
      height: 7px; border-radius: 4px; background: rgba(255,255,255,0.14); border: 1px solid var(--stroke);
    }
    .pnl input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 19px; height: 19px; margin-top: -7px;
      border-radius: 50%; background: #6aa0ff; border: 2px solid #0a0e16;
      box-shadow: 0 0 0 1px rgba(106,160,255,0.5); transition: background 0.12s, box-shadow 0.12s;
    }
    .pnl input[type=range]::-moz-range-thumb {
      width: 19px; height: 19px; border-radius: 50%; background: #6aa0ff; border: 2px solid #0a0e16;
      box-shadow: 0 0 0 1px rgba(106,160,255,0.5);
    }
    .pnl input[type=range]:hover::-webkit-slider-thumb { background: #8fb9ff; box-shadow: 0 0 0 4px rgba(106,160,255,0.28); }
    .pnl input[type=range]:hover::-moz-range-thumb { background: #8fb9ff; box-shadow: 0 0 0 4px rgba(106,160,255,0.28); }
    .pnl input[type=range]:active::-webkit-slider-thumb { background: #b6d2ff; }

    /* ---- LAYER GROUPS — the builder rows ---- */
    .layer { border: 1px solid var(--stroke); border-radius: 9px; overflow: hidden; }
    .layer.on { border-color: rgba(120,170,255,0.45); }
    .layer-head {
      display: flex; align-items: center; gap: 11px; padding: 11px 12px; cursor: pointer;
      background: rgba(255,255,255,0.03); user-select: none;
    }
    .layer-head:hover { background: rgba(255,255,255,0.06); }
    .layer-head .lname { flex: 1; font-size: 14px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--ink); font-weight: 700; }
    .layer.on .lname { color: #bcd6ff; }
    .layer-head .chev { color: var(--ink-dim); font-size: 13px; transition: transform 0.15s; }
    .layer.open .chev { transform: rotate(90deg); }
    .layer-body { display: none; flex-direction: column; gap: 10px; padding: 11px 13px 13px; border-top: 1px solid var(--stroke); }
    .layer.open .layer-body { display: flex; }
    /* a real checkbox toggle */
    .lck { width: 20px; height: 20px; border-radius: 5px; border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.04); position: relative; flex: 0 0 auto; cursor: pointer; }
    .layer.on .lck { background: #6aa0ff; border-color: #6aa0ff; }
    .layer.on .lck::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #04060c; font-size: 14px; font-weight: 800; }
    .sub { display: flex; align-items: center; gap: 6px; }
    .sub label { font-size: 12px; }
    .subtoggle { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { cursor: pointer; border: 1px solid var(--stroke); background: rgba(255,255,255,0.04);
      color: var(--ink-dim); border-radius: 7px; padding: 5px 10px; font-size: 12px; letter-spacing: 0.03em; }
    .pill.on { background: rgba(106,160,255,0.22); border-color: rgba(106,160,255,0.6); color: #cfe2ff; }

    /* ---- A contributor rows: checkbox + label, then a weight slider below ---- */
    .contrib { display: flex; flex-direction: column; gap: 5px; }
    .contrib.off { opacity: 0.45; }
    .contrib-head { display: flex; align-items: center; gap: 9px; }
    .contrib-head label { flex: 1; min-width: 0; text-transform: none; letter-spacing: 0.02em; font-size: 13px; cursor: pointer; }
    .lck.sm { width: 17px; height: 17px; border-radius: 4px; }
    .lck.sm.on { background: #6aa0ff; border-color: #6aa0ff; }
    .lck.sm.on::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #04060c; font-size: 12px; font-weight: 800; }
    .wslider { width: 100%; }

    .grp { margin-top: 2px; color: #9fd; font-size: 12px; letter-spacing: 0.14em;
      text-transform: uppercase; border-top: 1px solid var(--stroke); padding-top: 8px; }
    .btn { cursor: pointer; border: 1px solid var(--stroke); background: rgba(255,255,255,0.05);
      color: var(--ink); border-radius: 7px; padding: 6px 11px; font-size: 13px; }
    .btn:hover { border-color: rgba(255,255,255,0.3); }
    .preset { flex: 1; font-size: 12px; letter-spacing: 0.02em; padding: 7px 5px; }
    /* config action row (COPY · SAVE · СБРОС) */
    .cfgbar { display: flex; gap: 8px; }
    .cfgbar .btn { flex: 1; text-align: center; padding: 7px 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .cfgbar .btn.ok { border-color: rgba(120,220,160,0.7); color: #bff3d4; }

    /* free-floating, draggable HUD widgets */
    .hud-w {
      position: absolute; z-index: 31; white-space: nowrap; font-variant-numeric: tabular-nums;
      color: var(--ink); letter-spacing: 0.06em; font-size: 13px; padding: 2px 4px;
      transform-origin: top left; user-select: none; -webkit-user-select: none;
    }
    .hud-w.big { font-size: 30px; font-weight: 200; letter-spacing: 0.04em; }
    .hud-w.dim { color: var(--ink-dim); font-size: 12px; letter-spacing: 0.12em; }
    .hud-w .home { color: var(--home-color); font-weight: 600; }
    .hud-w .away { color: var(--away-color); font-weight: 600; }
    .hud-w .rsz { display: none; }
    body:not(.hud-edit) .hud-w { pointer-events: none; }
    body.hud-edit .hud-w { pointer-events: auto; cursor: move; outline: 1px dashed rgba(120,170,255,0.7); border-radius: 4px; }
    body.hud-edit .hud-w .rsz {
      display: block; position: absolute; right: -6px; bottom: -6px; width: 13px; height: 13px;
      background: #6aa0ff; border: 1px solid #04050a; border-radius: 3px; cursor: nwse-resize; pointer-events: auto;
    }
    /* STAGE13 — the top dev play/scrub/speed bar is REMOVED from the UI: play now lives on
       the bottom timeline button (#play13), speed moved into the left settings panel, and
       seeking is done by clicking/dragging the pulse timeline. Kept in the DOM (hidden) so
       the existing #play/#clock/#speed bindings keep working. */
    #playbar { display: none !important; }
    /* the pulse/timeline is now interactive — click or drag to seek */
    #hud13 #pulse13wrap { pointer-events: auto; cursor: pointer; }
    /* global play bar (top centre) */
    #playbar {
      position: fixed; z-index: 40; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; align-items: center; padding: 6px 12px;
      background: rgba(10,12,20,0.66); border: 1px solid var(--stroke); border-radius: 11px;
      backdrop-filter: blur(6px); font-size: 11px; color: var(--ink-dim);
    }
    #playbar input[type=range] { width: 220px; accent-color: #6aa0ff; }
    #playbar .clkv { font-variant-numeric: tabular-nums; color: var(--ink); min-width: 34px; }

    /* ---- MATCH SWITCHER TABS (top centre, above the play bar) ---- */
    #matchtabs {
      position: fixed; z-index: 41; top: 12px; left: 14px;
      display: flex; gap: 6px; align-items: center; padding: 5px;
      background: rgba(10,12,20,0.66); border: 1px solid var(--stroke); border-radius: 11px;
      backdrop-filter: blur(6px);
    }
    #matchtabs .mtab {
      cursor: pointer; border: 1px solid transparent; background: transparent;
      color: var(--ink-dim); border-radius: 8px; padding: 6px 13px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      transition: background 0.14s, color 0.14s, border-color 0.14s;
    }
    #matchtabs .mtab:hover { color: var(--ink); background: rgba(255,255,255,0.05); }
    #matchtabs .mtab.on { background: rgba(106,160,255,0.20); border-color: rgba(106,160,255,0.55); color: #cfe2ff; }

    /* ---- TEAM FLAGS beside the names (HUD) ---- */
    .hud-w .flag {
      display: inline-block; vertical-align: middle; width: 1.15em; height: 0.82em;
      object-fit: cover; border-radius: 2px; box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
      margin: 0 0.28em;
    }

    /* ---- BOTTOM MOMENTUM / PULSE STRIP — within the centered column (STAGE11 #3) ----
       Compressed to a centered band (NOT full-width) and made TALLER. It's a child of
       #composition (max 1000px), and further inset so it doesn't span edge-to-edge. */
    #pulse {
      position: absolute; z-index: 20; bottom: 18px; left: 50%; transform: translateX(-50%);
      width: 78%; height: 120px; display: block; pointer-events: none;
    }
    /* ---- GOAL MARKERS ROW above the pitch — within the centered column ---- */
    /* STAGE13 — the OLD top goal-token row is DISABLED (goals + reds now live under
       the teams). The canvas stays in the DOM (drawMarkers is a no-op in stage13.js)
       but is hidden so it never paints duplicate goal indicators. */
    #markers { display: none; }

    /* ========================================================================
       STAGE 13 — FINALIZED HUD CHROME (visual target: public/design/vB2.html).
       Only the surrounding chrome is restyled; the 3D engine / pitch / camera /
       constructor panel / sky / data loading are untouched. Fonts: Space Grotesk
       (labels/UI) + Space Mono (numerics/telemetry).
       ======================================================================== */
    :root {
      --s13-mono: 'Space Mono', ui-monospace, monospace;
      --s13-grot: 'Space Grotesk', system-ui, sans-serif;
      --s13-ink:   #e9e7f4;
      --s13-dim:   #8f89ad;
      --s13-faint: #4a4470;
      --s13-fainter: #322c52;
      --s13-red:   #e5333a;   /* sending-off red */
    }
    /* the whole HUD overlay lives inside the centered composition column so it
       centres with the pitch. It never eats pointer events except where noted. */
    #hud13 { position: absolute; inset: 0; z-index: 22; pointer-events: none;
      font-family: var(--s13-grot); color: var(--s13-ink); }

    /* ---- header: teams (top-left) + clock (top-right) ---- */
    #hud13 .head { position: absolute; top: 44px; left: 46px; right: 46px;
      display: flex; justify-content: space-between; align-items: flex-start; }
    #hud13 .teams { display: flex; gap: 40px; }
    #hud13 .team { display: flex; flex-direction: column; align-items: flex-start; }
    #hud13 .team-id { display: flex; align-items: center; gap: 8px; height: 20px; }
    #hud13 .flag { width: 24px; height: 16px; border-radius: 1.5px; overflow: hidden;
      object-fit: cover; box-shadow: 0 0 0 1px rgba(255,255,255,.10); display: block; flex: 0 0 auto; }
    #hud13 .abbr { font-family: var(--s13-grot); font-weight: 600; font-size: 14px;
      letter-spacing: .22em; text-transform: uppercase; color: var(--s13-ink); padding-left: 1px; }

    /* thick country-colour rail (home = home colour, away = away colour) */
    #hud13 .rail { height: 6px; margin-top: 10px; width: 100%; min-width: 88px; border-radius: 2px; }
    #hud13 .team--home .rail { background: var(--home-color);
      box-shadow: 0 0 10px color-mix(in srgb, var(--home-color) 55%, transparent); }
    #hud13 .team--away .rail { background: var(--away-color);
      box-shadow: 0 0 10px color-mix(in srgb, var(--away-color) 55%, transparent); }

    #hud13 .score { font-family: var(--s13-mono); font-weight: 700; font-size: 116px; line-height: .9;
      letter-spacing: -.02em; color: #fff; margin-top: 14px;
      font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

    /* per-team event rows under the score — NO word labels, marker shape carries meaning. */
    #hud13 .events { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    #hud13 .ev { display: flex; align-items: center; gap: 10px; min-height: 18px; }
    #hud13 .ev .v { font-family: var(--s13-mono); font-size: 15px; letter-spacing: .01em;
      color: var(--s13-ink); display: inline-flex; align-items: center; gap: 9px; }
    /* GOAL — filled disc in the team colour */
    #hud13 .mk.goal { width: 14px; height: 14px; border-radius: 50%; flex: 0 0 auto; }
    #hud13 .team--home .mk.goal { background: var(--home-color);
      box-shadow: 0 0 8px color-mix(in srgb, var(--home-color) 55%, transparent); }
    #hud13 .team--away .mk.goal { background: var(--away-color);
      box-shadow: 0 0 8px color-mix(in srgb, var(--away-color) 55%, transparent); }
    /* RED CARD — upright red card rect */
    #hud13 .mk.red { width: 13px; height: 18px; border-radius: 2px; background: var(--s13-red);
      box-shadow: 0 0 7px rgba(229,51,58,.5); flex: 0 0 auto; }
    /* PENALTY SHOOTOUT — a row of rings; SCORED = hollow ring, MISSED = filled ring */
    #hud13 .ev.shoot { gap: 8px; }
    #hud13 .pk { width: 13px; height: 13px; border-radius: 50%; box-sizing: border-box; flex: 0 0 auto; }
    #hud13 .pk.scored { background: transparent; border: 2px solid var(--s13-ink); }
    #hud13 .pk.miss { background: var(--s13-faint); }

    /* ---- clock (top-right) — no LIVE indicator anywhere ---- */
    #hud13 .clock { text-align: right; }
    /* the minute NUMBER is right-aligned (fixed right edge as digits grow); the apostrophe
       hangs as a superscript ABOVE and just BEYOND that right edge. */
    #hud13 .clock .t { position: relative; display: inline-block;
      font-family: var(--s13-mono); font-weight: 700; font-size: 46px;
      letter-spacing: -.01em; color: var(--s13-ink); font-variant-numeric: tabular-nums; line-height: 1; }
    #hud13 .clock .t em { position: absolute; top: -0.02em; right: 0; transform: translateX(118%);
      font-style: normal; font-size: 0.4em; font-weight: 600; color: var(--s13-ink); line-height: 1; }
    #hud13 .clock .half { margin-top: 10px; font-family: var(--s13-grot); font-size: 10px;
      letter-spacing: .22em; text-transform: uppercase; color: var(--s13-dim); }

    /* ---- merged control + pulse (transparent, no plate) — bottom ---- */
    #hud13 .console { position: absolute; left: 46px; right: 46px; bottom: 98px; z-index: 24;
      display: flex; align-items: center; gap: 16px; pointer-events: none; }
    #hud13 .play13 { flex: 0 0 auto; width: 56px; height: 56px; border-radius: 50%;
      border: 1.5px solid var(--s13-faint); background: rgba(20,13,38,.35);
      display: flex; align-items: center; justify-content: center; position: relative;
      backdrop-filter: blur(2px); cursor: pointer; pointer-events: auto; padding: 0; }
    #hud13 .play13:hover { border-color: var(--s13-dim); }
    #hud13 .play13 svg { display: block; }
    /* the seismograph canvas fills the rest of the console; transparent bg (restyled in JS) */
    #hud13 #pulse13wrap { flex: 1 1 auto; height: 120px; position: relative; margin-left: -2px; }

    /* ---- footer reference strip (TEXT, video-safe, static) ---- */
    /* two LEFT-aligned lines — one clean type system: same face, size, leading + spacing. */
    #hud13 .footstrip { position: absolute; left: 46px; right: 46px; bottom: 20px; z-index: 25;
      display: flex; flex-direction: column; align-items: flex-start; gap: 3px;
      border-top: 1px solid var(--s13-fainter); padding-top: 13px;
      font-family: var(--s13-grot); font-size: 12.5px; line-height: 1.5; letter-spacing: .012em; color: var(--s13-dim); }
    #hud13 .footstrip .fline { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    #hud13 .footstrip .f-name { color: var(--s13-ink); font-weight: 600; }
    #hud13 .footstrip .f-dot { color: var(--s13-faint); }
    #hud13 .footstrip .f-social { display: inline-flex; align-items: center; gap: 5px; color: var(--s13-dim); }
    #hud13 .footstrip .f-social svg { width: 13px; height: 13px; fill: currentColor; opacity: .85; }
    #hud13 .footstrip .f-dom { color: var(--s13-ink); font-weight: 600; }
    #hud13 .footstrip .f-meta { color: var(--s13-faint); }
    #hud13 .footstrip .f-meta b { color: var(--s13-dim); font-weight: 600; }

    /* STAGE13 — the bottom pulse canvas is repositioned inside the console (transparent,
       no plate). Override stage12's centered translucent-band placement. */
    #pulse {
      position: static; transform: none; width: 100%; height: 120px;
      left: auto; bottom: auto; display: block; pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- STAGE11 #2/#4 — full-bleed score-tinted backdrop halo, BEHIND the centered column -->
  <div id="backdrop"></div>

  <!-- STAGE11 #4 — centered ~1000px composition column: 3D canvas + HUD -->
  <div id="composition">
    <canvas id="stage"></canvas>

    <!-- OLD goal-markers canvas kept for compatibility but DISABLED (drawMarkers is a
         no-op in stage13.js); goals + reds now render under the teams in #hud13. -->
    <canvas id="markers"></canvas>

    <!-- STAGE13 FINALIZED HUD CHROME (matches public/design/vB2.html) -->
    <div id="hud13">
      <div class="head">
        <!-- teams + score + per-team event blocks -->
        <div class="teams">
          <!-- HOME team -->
          <div class="team team--home">
            <div class="team-id"><img class="flag" id="hFlag" alt=""><span class="abbr" id="hAbbr">FRA</span></div>
            <div class="rail"></div>
            <div class="score" id="hScore">0</div>
            <div class="events" id="hEvents"><!-- goals / red / shootout rows injected by updateEventBlocks() --></div>
          </div>
          <!-- AWAY team -->
          <div class="team team--away">
            <div class="team-id"><img class="flag" id="aFlag" alt=""><span class="abbr" id="aAbbr">SEN</span></div>
            <div class="rail"></div>
            <div class="score" id="aScore">0</div>
            <div class="events" id="aEvents"><!-- goals / red / shootout rows injected by updateEventBlocks() --></div>
          </div>
        </div>

        <!-- clock (top-right) — NO LIVE indicator -->
        <div class="clock">
          <div class="t"><span id="clk2">0</span><em>'</em></div>
          <div class="half" id="clkHalf">1st Half</div>
        </div>
      </div>

      <!-- merged control + pulse (transparent, no plate) -->
      <div class="console">
        <button class="play13" id="play13" aria-label="Play/Pause">
          <svg width="16" height="18" viewBox="0 0 16 18" aria-hidden="true">
            <path d="M1 1 L15 9 L1 17 Z" fill="none" stroke="#e9e7f4" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="pulse13wrap">
          <!-- BOTTOM MOMENTUM / PULSE (whole-match seismograph + playhead), restyled to
               a clean off-white seismograph in stage13.js drawPulse. -->
          <canvas id="pulse"></canvas>
        </div>
      </div>

      <!-- bottom reference strip — TWO left-aligned lines (identity / domain + sources), TEXT (video-safe) -->
      <div class="footstrip">
        <div class="fline">
          <span class="f-name">Alexander Bogachev, Data Visualization Lead</span>
          <span class="f-dot">•</span>

  <!-- MATCH SWITCHER TABS -->
  <div id="matchtabs">
    <button class="mtab" data-id="1953888">FRA · SEN</button>
    <button class="mtab" data-id="1994739">PAR · FRA</button>
    <button class="mtab" data-id="1990970">GER · PAR</button>
    <button class="mtab" data-id="1990967">ICO · NOR</button>
  </div>

  <!-- GLOBAL play / scrub / speed -->
  <div id="playbar">
    <button id="play" class="btn">❚❚</button>
    <button id="restart" class="btn">↺</button>
    <input id="clock" type="range" min="0" max="100" step="0.05" value="0">
    <span class="clkv" id="clk">0'</span>
    <label style="text-transform:uppercase;letter-spacing:0.1em">speed</label>
    <input id="speed" type="range" min="0.2" max="6" step="0.1" value="0.9" style="width:90px">
    <span class="clkv" id="speedV">0.9×</span>
  </div>

  <!-- LEFT — the layer constructor -->
  <div id="panel" class="pnl">
    <div id="title2">STAGE 12 · CONSTRUCTOR · loading…</div>

    <div class="cfgbar">
      <button id="cfgcopy" class="btn">копировать</button>
      <button id="cfgsave" class="btn">сохранить</button>
      <button id="cfgreset" class="btn">сброс</button>
    </div>

    <!-- STAGE13 — playback SPEED + RESTART, moved here from the removed top bar -->
    <div class="ctl" style="margin-top:2px">
      <div class="ctl-head"><label>скорость</label><span class="val" id="speedV2">1.0×</span></div>
      <input id="speed2" type="range" min="0.2" max="6" step="0.1" value="1">
    </div>
    <div class="cfgbar"><button id="restart2" class="btn" style="flex:1">↺ сначала</button></div>
    <textarea id="cfgPaste" readonly style="display:none;width:100%;height:84px;margin-top:2px;box-sizing:border-box;font:11px/1.35 ui-monospace,monospace;background:#0a0e16;color:#9fd;border:1px solid var(--stroke);border-radius:6px;padding:7px;resize:vertical"></textarea>

    <div id="layers" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <!-- camera / layout -->
  <div id="campanel" class="pnl">
    <div class="row"><label>camera ▸ ракурс</label><span class="val" id="camread">—</span></div>
    <div class="row">
      <button id="copycam" class="btn">copy camera</button>
      <button id="resetcam" class="btn">reset</button>
    </div>
    <div class="row" style="margin-top:2px">
      <button id="hudedit" class="btn" style="flex:1">✥ двигать HUD</button>
      <button id="hudsave" class="btn" style="flex:1">save</button>
      <button id="hudreset" class="btn">reset</button>
    </div>
    <div class="dim" style="color:var(--ink-dim);font-size:10px">drag to orbit · wheel to zoom</div>
  </div>

  <script type="module" src="stage13.js"></script>
