<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup Pulse — vD · Gallery Ambient</title>
<!--
  DIRECTION D — GALLERY AMBIENT LUXE
  Font pairing:
    · Fraunces (Undercase Type) — light optical display serif, high-contrast.
      Used ONLY for the score numerals. Whisper-elegant, museum-object weight.
    · Archivo (Omnibus-Type) — refined grotesque, wide-tracked small caps for
      all micro-labels (team abbr, clock, captions) — museum wall-label voice.
  References applied:
    · Active Theory / Locomotive — chrome dissolves, the object breathes; premium
      immersion "suggests, reveals, lets the viewer conclude the quality."
    · Museum wall label — micro-copy tucked to hairline-ruled corners, ample
      negative space, single quiet accent.
    · Awwwards minimal / whisper-hierarchy — nav present-when-needed, invisible
      otherwise; transparent pulse line rather than a UI plate.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500&family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#17102e;
    --bg-deep:#120b23;
    --pitch:#d7d7dd;
    --ink:#e9e6f2;
    --ink-soft:rgba(233,230,242,.60);
    --ink-faint:rgba(233,230,242,.34);
    --hair:rgba(233,230,242,.14);
    --par:#ee3f2d;
    --fra:#387ef0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(130% 110% at 50% 38%, #1c1436 0%, var(--bg) 46%, var(--bg-deep) 100%);
    color:var(--ink);
    font-family:"Archivo",system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    -webkit-font-smoothing:antialiased;
  }

  .stage{
    position:relative;
    width:100%;
    max-width:700px;
    height:760px;
    overflow:hidden;
    isolation:isolate;
  }

  /* ambient vignette so the object sits deeper in the room */
  .stage::after{
    content:"";
    position:absolute;inset:0;
    pointer-events:none;
    background:radial-gradient(120% 90% at 50% 46%, transparent 55%, rgba(9,5,20,.55) 100%);
    z-index:6;
  }

  /* ---- micro label system (museum wall label) ---- */
  .label{
    font-size:10.5px;
    font-weight:500;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--ink-faint);
  }

  /* ===== TOP-LEFT: teams + score ===== */
  .scoreboard{
    position:absolute;
    top:64px;left:64px;
    z-index:5;
    display:flex;
    gap:52px;
  }
  .team{display:flex;flex-direction:column;align-items:flex-start;}
  .team .head{
    display:flex;align-items:center;gap:11px;
    margin-bottom:6px;
  }
  .flag{
    width:19px;height:13px;
    border-radius:2px;
    box-shadow:0 0 0 1px rgba(255,255,255,.10), 0 2px 6px rgba(0,0,0,.35);
    overflow:hidden;
    display:block;
    opacity:.94;
  }
  .abbr{
    font-size:13px;
    font-weight:500;
    letter-spacing:.34em;
    color:var(--ink-soft);
    padding-left:.05em;
  }
  /* the whisper of accent: a 1px underline tick beneath each abbr */
  .tick{
    width:24px;height:1px;margin-top:9px;
    background:var(--hair);
  }
  .team.par .tick{background:linear-gradient(90deg,var(--par),transparent);}
  .team.fra .tick{background:linear-gradient(90deg,var(--fra),transparent);}

  .num{
    font-family:"Fraunces",serif;
    font-optical-sizing:auto;
    font-weight:200;
    font-size:112px;
    line-height:.86;
    letter-spacing:-.01em;
    color:var(--ink);
    margin-top:20px;
    font-feature-settings:"lnum" 1;
  }
  .team.par .num{color:#f2eef7;}
  .team.fra .num{color:#ffffff;}

  /* ===== TOP-RIGHT: clock ===== */
  .clock{
    position:absolute;
    top:64px;right:64px;
    z-index:5;
    text-align:right;
  }
  .clock .k{ display:block; margin-bottom:12px; }
  .clock .t{
    font-family:"Fraunces",serif;
    font-weight:300;
    font-size:34px;
    letter-spacing:.01em;
    color:var(--ink-soft);
  }
  .clock .t sup{
    font-size:.5em;
    vertical-align:super;
    color:var(--ink-faint);
    margin-left:1px;
  }

  /* ===== corner hairlines — frames the room, whisper only ===== */
  .corner{position:absolute;width:26px;height:26px;z-index:4;opacity:.5;}
  .corner span{position:absolute;background:var(--hair);}
  .corner .h{height:1px;width:100%;}
  .corner .v{width:1px;height:100%;}
  .corner.tl{top:32px;left:32px}
  .corner.tr{top:32px;right:32px}
  .corner.bl{bottom:32px;left:32px}
  .corner.br{bottom:32px;right:32px}
  .corner.tr .h,.corner.br .h{right:0}
  .corner.tr .v,.corner.br .v{right:0}
  .corner.bl .h,.corner.br .h{bottom:0}

  /* ===== tiny red-card marker, tucked below score, minimal ===== */
  .redcard{
    position:absolute;
    top:246px;left:64px;
    z-index:5;
    display:flex;align-items:center;gap:10px;
  }
  .redcard .chip{
    width:7px;height:11px;border-radius:1.5px;
    background:var(--par);
    box-shadow:0 0 10px rgba(238,63,45,.35);
    opacity:.9;
  }
  .redcard .m{
    font-size:9.5px;letter-spacing:.3em;font-weight:400;
    color:var(--ink-faint);text-transform:uppercase;
  }

  /* ===== CENTERPIECE: pitch stand-in (do not restyle) ===== */
  .pitch-wrap{
    position:absolute;
    inset:0;
    display:flex;align-items:center;justify-content:center;
    z-index:2;
  }
  .pitch-svg{
    width:100%;height:100%;
    /* nudge slightly below vertical centre */
    transform:translateY(34px);
  }

  /* ===== BOTTOM: merged play + transparent pulse ===== */
  .transport{
    position:absolute;
    left:64px;right:64px;
    bottom:74px;
    z-index:5;
    display:flex;align-items:center;gap:22px;
  }
  .play{
    flex:0 0 auto;
    width:52px;height:52px;
    border-radius:50%;
    border:1px solid var(--hair);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    transition:border-color .4s ease;
  }
  .play::before{
    content:"";
    position:absolute;inset:-1px;border-radius:50%;
    border:1px solid transparent;
    background:linear-gradient(180deg,rgba(233,230,242,.16),transparent) border-box;
    -webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    opacity:.6;
  }
  .play svg{display:block;margin-left:2px;}

  .pulse{flex:1 1 auto;height:52px;position:relative;overflow:visible;}
  .pulse svg{display:block;width:100%;height:100%;overflow:visible;}
  .pulse .base{stroke:var(--hair);stroke-width:1;}
  .pulse .wave{
    stroke:var(--ink-soft);
    stroke-width:1.3;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
    vector-effect:non-scaling-stroke;
  }
  .pulse .wave.past{stroke:var(--ink-faint);}
  .playhead line{stroke:var(--par);stroke-width:1;opacity:.55;}
  .playhead circle{fill:var(--par);}

  /* ===== footer caption ===== */
  .caption{
    position:absolute;
    bottom:34px;left:0;right:0;
    text-align:center;
    z-index:6;
    font-size:9px;
    letter-spacing:.36em;
    text-transform:uppercase;
    color:rgba(233,230,242,.24);
  }
  .title-mark{
    position:absolute;
    bottom:34px;left:64px;
    z-index:6;
    font-size:9px;
    letter-spacing:.36em;
    color:rgba(233,230,242,.30);
  }
  .caption{ text-align:right; right:64px; left:auto; }
</style>
</head>
<body>
  <div class="stage">

    <!-- corner hairlines -->
    <div class="corner tl"><span class="h"></span><span class="v"></span></div>
    <div class="corner tr"><span class="h"></span><span class="v"></span></div>
    <div class="corner bl"><span class="h"></span><span class="v"></span></div>
    <div class="corner br"><span class="h"></span><span class="v"></span></div>

    <!-- CENTERPIECE — pitch stand-in (context only, do not reposition) -->
    <div class="pitch-wrap">
      <svg class="pitch-svg" viewBox="0 0 700 760" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <linearGradient id="pitchFill" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e2e2e8"/>
            <stop offset="1" stop-color="#c7c7d0"/>
          </linearGradient>
          <filter id="pitchGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000000" flood-opacity="0.42"/>
          </filter>
          <radialGradient id="pitchSheen" cx="0.42" cy="0.34" r="0.8">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
            <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- parallelogram ~55% width, centred, tilted orthographic -->
        <g filter="url(#pitchGlow)">
          <polygon points="140,430 470,346 560,470 230,554"
                   fill="url(#pitchFill)"/>
          <polygon points="140,430 470,346 560,470 230,554"
                   fill="url(#pitchSheen)"/>
        </g>
      </svg>
    </div>

    <!-- TOP-LEFT: teams + score -->
    <div class="scoreboard">
      <div class="team par">
        <div class="head">
          <span class="flag">
            <svg width="19" height="13" viewBox="0 0 9 6">
              <rect width="9" height="2" y="0" fill="#d52b1e"/>
              <rect width="9" height="2" y="2" fill="#ffffff"/>
              <rect width="9" height="2" y="4" fill="#0038a8"/>
            </svg>
          </span>
          <span class="abbr">PAR</span>
        </div>
        <span class="tick"></span>
        <div class="num">0</div>
      </div>

      <div class="team fra">
        <div class="head">
          <span class="flag">
            <svg width="19" height="13" viewBox="0 0 9 6">
              <rect width="3" height="6" x="0" fill="#0055a4"/>
              <rect width="3" height="6" x="3" fill="#ffffff"/>
              <rect width="3" height="6" x="6" fill="#ef4135"/>
            </svg>
          </span>
          <span class="abbr">FRA</span>
        </div>
        <span class="tick"></span>
        <div class="num">1</div>
      </div>
    </div>

    <!-- tiny red-card marker -->
    <div class="redcard">
      <span class="chip"></span>
      <span class="m">Red &nbsp;·&nbsp; 68'</span>
    </div>

    <!-- TOP-RIGHT: clock -->
    <div class="clock">
      <span class="k label">Live</span>
      <span class="t">75<sup>′</sup></span>
    </div>

    <!-- BOTTOM: merged play + transparent pulse -->
    <div class="transport">
      <div class="play" aria-label="play">
        <svg width="13" height="15" viewBox="0 0 13 15">
          <path d="M1 1 L12 7.5 L1 14 Z" fill="none" stroke="var(--ink-soft)" stroke-width="1" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="pulse">
        <svg viewBox="0 0 560 52" preserveAspectRatio="none">
          <!-- baseline -->
          <line class="base" x1="0" y1="26" x2="560" y2="26"/>
          <!-- past segment (before playhead) -->
          <path class="wave past" d="M0,26 L26,26 L34,24 L42,27 L58,26 L70,20 L78,33 L86,26
            L104,26 L112,15 L120,38 L128,22 L136,29 L150,26 L162,26 L170,23 L178,28 L196,26
            L208,26 L216,9 L224,44 L232,18 L240,31 L252,26 L266,26 L274,25 L282,27 L300,26 L318,26"/>
          <!-- future segment (after playhead) -->
          <path class="wave" d="M318,26 L332,26 L340,22 L348,29 L362,26 L376,26 L384,17 L392,36
            L400,23 L408,28 L422,26 L440,26 L448,24 L456,28 L470,26 L486,26 L494,21 L502,30
            L510,25 L518,27 L534,26 L560,26"/>
          <!-- playhead -->
          <g class="playhead">
            <line x1="318" y1="4" x2="318" y2="48"/>
            <circle cx="318" cy="26" r="2.4"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- footer -->
    <div class="title-mark label">World Cup Pulse</div>
    <div class="caption">D · Gallery Ambient · Fraunces / Archivo</div>

  </div>
</body>
</html>
