<!--
  World Cup Pulse — Chrome/HUD mockup
  Direction B (revised) · SWISS TECHNICAL / DATA INSTRUMENT
  Revision per feedback:
   · removed xG + possession, removed LIVE indicator
   · under each team (below the score): THREE event blocks — GOALS / RED / PEN — with minutes,
     each tied to its own team; red cards & penalties live here now (yellow cards not shown)
   · team colour rails thickened, each in its own country colour (PAR red / FRA blue)
   · pulse/timeline taken from Direction A (clean off-white seismograph, no oscilloscope graticule)
   · bottom reference strip = personal links (LinkedIn / Twitter)
  Type: Space Grotesk (labels/UI) + Space Mono (numerics/telemetry)
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup Pulse · B2 · Swiss Technical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #17102e;
    --bg-2:      #1b1436;
    --ink:       #e9e7f4;
    --dim:       #8f89ad;
    --faint:     #4a4470;
    --fainter:   #322c52;
    --pitch:     #d7d7dd;
    --accent:    #387ef0;   /* FRA blue */
    --par:       #ee3f2d;   /* PAR red  */
    --red:       #e5333a;   /* sending-off red */
    --mono:      'Space Mono', ui-monospace, monospace;
    --grot:      'Space Grotesk', system-ui, sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ display:block; }
  body{
    width:100%;
    background:radial-gradient(120% 90% at 50% 42%, #1d1540 0%, var(--bg) 55%, #120c22 100%);
    color:var(--ink); font-family:var(--grot);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px 16px;
  }

  /* ————— FRAME ————— */
  .frame{
    position:relative; width:100%; max-width:700px; height:760px;
    background:
      radial-gradient(135% 100% at 50% 38%, rgba(56,126,240,.05) 0%, rgba(0,0,0,0) 46%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 60%, #130c24 100%);
    border:1px solid var(--fainter); overflow:hidden; isolation:isolate;
  }
  .grid{
    position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(to right, var(--fainter) 1px, transparent 1px),
      linear-gradient(to bottom, var(--fainter) 1px, transparent 1px);
    background-size:calc(100%/8) calc(100%/9); opacity:.5;
  }
  .reg{ position:absolute; inset:22px; border:1px solid var(--fainter); z-index:1; pointer-events:none; }
  .tick{ position:absolute; background:var(--faint); }
  .tick.h{ width:11px; height:1px; } .tick.v{ width:1px; height:11px; }
  .c-tl-h{ top:22px; left:22px; } .c-tl-v{ top:22px; left:22px; }
  .c-tr-h{ top:22px; right:22px; } .c-tr-v{ top:22px; right:22px; }
  .c-bl-h{ bottom:22px; left:22px; } .c-bl-v{ bottom:22px; left:22px; }
  .c-br-h{ bottom:22px; right:22px; } .c-br-v{ bottom:22px; right:22px; }
  .ruler{ position:absolute; z-index:1; pointer-events:none; display:flex; }
  .ruler.left{ top:22px; bottom:22px; left:22px; flex-direction:column; justify-content:space-between; }
  .ruler.top{ left:22px; right:22px; top:22px; justify-content:space-between; }
  .ruler.left i{ width:5px; height:1px; background:var(--faint); }
  .ruler.top i{ width:1px; height:5px; background:var(--faint); }

  /* ————— CONTENT ————— */
  .content{ position:absolute; inset:0; z-index:3; padding:44px 46px; }
  .head{ display:flex; justify-content:space-between; align-items:flex-start; }

  .teams{ display:flex; gap:40px; }
  .team{ display:flex; flex-direction:column; align-items:flex-start; }
  .team-id{ display:flex; align-items:center; gap:8px; height:20px; }
  .flag{ width:24px; height:16px; border-radius:1.5px; overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,.10); display:block; flex:0 0 auto; }
  .abbr{ font-family:var(--grot); font-weight:600; font-size:14px;
    letter-spacing:.22em; text-transform:uppercase; color:var(--ink); padding-left:1px; }

  /* thick country-colour rail */
  .rail{ height:6px; margin-top:10px; width:100%; border-radius:2px; }
  .team--par .rail{ background:var(--par); box-shadow:0 0 10px rgba(238,63,45,.45); }
  .team--fra .rail{ background:var(--accent); box-shadow:0 0 10px rgba(56,126,240,.5); }

  .score{ font-family:var(--mono); font-weight:700; font-size:116px; line-height:.9;
    letter-spacing:-.02em; color:var(--ink); margin-top:14px;
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; }
  .team--par .score{ color:#cfcbe4; }
  .team--fra .score{ color:#ffffff; }

  /* event rows under the score — NO word labels, marker shape carries the meaning.
     goals = team-colour disc + minute · red = card + minute · shootout = row of rings. */
  .events{ margin-top:20px; display:flex; flex-direction:column; gap:12px; }
  .ev{ display:flex; align-items:center; gap:10px; min-height:18px; }
  .ev .v{ font-family:var(--mono); font-size:15px; letter-spacing:.01em; color:var(--ink);
    display:inline-flex; align-items:center; gap:9px; }
  /* GOAL — filled disc in the team colour */
  .mk.goal{ width:14px; height:14px; border-radius:50%; flex:0 0 auto; }
  .team--par .mk.goal{ background:var(--par); box-shadow:0 0 8px rgba(238,63,45,.45); }
  .team--fra .mk.goal{ background:var(--accent); box-shadow:0 0 8px rgba(56,126,240,.5); }
  /* RED CARD — upright card */
  .mk.red{ width:13px; height:18px; border-radius:2px; background:var(--red);
    box-shadow:0 0 7px rgba(229,51,58,.5); flex:0 0 auto; }
  /* PENALTY SHOOTOUT — a row of rings; SCORED = hollow ring, MISSED = filled */
  .ev.shoot{ gap:8px; }
  .pk{ width:13px; height:13px; border-radius:50%; box-sizing:border-box; flex:0 0 auto; }
  .pk.scored{ background:transparent; border:2px solid var(--ink); }
  .pk.miss{ background:var(--faint); }

  /* clock (top-right) — no LIVE, no cards */
  .clock{ text-align:right; }
  .clock .t{ font-family:var(--mono); font-weight:700; font-size:46px; letter-spacing:-.01em;
    color:var(--ink); font-variant-numeric:tabular-nums; line-height:1; }
  .clock .t em{ font-style:normal; color:var(--accent); }
  .clock .half{ margin-top:10px; font-family:var(--grot); font-size:9px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--dim); }

  /* ————— CENTERPIECE STAND-IN (context only) ————— */
  .stage{ position:absolute; inset:0; z-index:2; pointer-events:none; }
  .pitch-wrap{ position:absolute; left:50%; top:57%; transform:translate(-50%,-50%);
    width:55%; aspect-ratio:1.62/1; }
  .pitch{ position:absolute; inset:0;
    background:linear-gradient(160deg, #e2e2e8 0%, var(--pitch) 45%, #c7c7d0 100%);
    clip-path:polygon(26% 8%, 100% 40%, 74% 92%, 0% 60%);
    filter:drop-shadow(0 26px 46px rgba(0,0,0,.55)); }
  .pitch-glow{ position:absolute; inset:-18%;
    background:radial-gradient(closest-side, rgba(160,175,235,.16), transparent 72%); }
  .locator{ position:absolute; left:50%; top:57%; transform:translate(-50%,-50%);
    width:55%; aspect-ratio:1.62/1; z-index:2; pointer-events:none; }

  /* ————— MERGED CONTROL + PULSE (transparent) — timeline from Direction A ————— */
  .console{ position:absolute; left:46px; right:46px; bottom:62px; z-index:4;
    display:flex; align-items:center; gap:16px; }
  .play{ flex:0 0 auto; width:56px; height:56px; border-radius:50%;
    border:1.5px solid var(--faint); background:rgba(20,13,38,.35);
    display:flex; align-items:center; justify-content:center; position:relative; backdrop-filter:blur(2px); }
  .play::before{ content:""; position:absolute; top:-1px; left:50%; width:2px; height:9px;
    background:var(--accent); transform:translateX(-50%); box-shadow:0 0 6px var(--accent); }
  .play svg{ margin-left:3px; }
  .pulse{ flex:1 1 auto; height:60px; position:relative; margin-left:-2px; }
  .pulse svg{ display:block; width:100%; height:100%; overflow:visible; }

  /* ————— BOTTOM REFERENCE STRIP — credits + data sources (TEXT, this renders in a video) ————— */
  .footstrip{ position:absolute; left:46px; right:46px; bottom:24px; z-index:5;
    display:flex; flex-wrap:wrap; align-items:center; gap:8px;
    border-top:1px solid var(--fainter); padding-top:11px;
    font-family:var(--grot); font-size:12px; color:var(--dim); }
  .footstrip .f-name{ color:var(--ink); font-weight:500; }
  .footstrip .f-dot{ color:var(--faint); }
  .footstrip .f-social{ display:inline-flex; align-items:center; gap:5px; color:var(--dim); }
  .footstrip .f-social svg{ width:12px; height:12px; fill:currentColor; opacity:.85; }
  .footstrip .f-sources{ margin-left:auto; font-family:var(--mono); font-size:11px;
    letter-spacing:.02em; color:var(--faint); }
  .footstrip .f-sources b{ color:var(--dim); font-weight:700; }

  .figref{ position:fixed; left:14px; bottom:11px; font-family:var(--grot); font-size:11px;
    letter-spacing:.05em; color:#5a5478; font-weight:500; }
</style>
</head>
<body>
  <div class="frame">
    <div class="grid"></div>

    <!-- registration frame + rulers -->
    <div class="reg"></div>
    <span class="tick h c-tl-h"></span><span class="tick v c-tl-v"></span>
    <span class="tick h c-tr-h"></span><span class="tick v c-tr-v"></span>
    <span class="tick h c-bl-h"></span><span class="tick v c-bl-v"></span>
    <span class="tick h c-br-h"></span><span class="tick v c-br-v"></span>
    <div class="ruler left"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="ruler top"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <!-- centerpiece stand-in (DO NOT restyle) -->
    <div class="stage">
      <div class="pitch-wrap"><div class="pitch-glow"></div><div class="pitch"></div></div>
      <svg class="locator" viewBox="0 0 200 124" preserveAspectRatio="none" aria-hidden="true">
        <line x1="100" y1="-30" x2="100" y2="6"  stroke="#4a4470" stroke-width="1" stroke-dasharray="2 4"/>
        <line x1="100" y1="118" x2="100" y2="154" stroke="#4a4470" stroke-width="1" stroke-dasharray="2 4"/>
        <circle cx="100" cy="62" r="2.2" fill="none" stroke="#4a4470" stroke-width="1"/>
      </svg>
    </div>

    <!-- HUD content -->
    <div class="content">
      <div class="head">

        <!-- teams + score + event blocks -->
        <div class="teams">

          <div class="team team--par">
            <div class="team-id">
              <svg class="flag" viewBox="0 0 24 16" aria-label="Paraguay">
                <rect width="24" height="5.33" y="0"    fill="#d52b1e"/>

                <rect width="24" height="5.33" y="10.67" fill="#0038a8"/>
                <circle cx="12" cy="8" r="2.2" fill="#ffe600" stroke="#0a6e2e" stroke-width=".5"/>
              </svg>
              <span class="abbr">PAR</span>
            </div>
            <div class="rail"></div>
            <div class="score">0</div>
            <div class="events">
              <!-- red card -->
              <div class="ev"><span class="v"><span class="mk red"></span>74'</span></div>
              <!-- penalty shootout: rings — hollow=scored, filled=missed (illustrative) -->
              <div class="ev shoot">
                <span class="pk scored"></span><span class="pk miss"></span><span class="pk scored"></span><span class="pk scored"></span><span class="pk miss"></span>
              </div>
            </div>
          </div>

          <div class="team team--fra">
            <div class="team-id">
              <svg class="flag" viewBox="0 0 24 16" aria-label="France">
                <rect width="8" height="16" x="0"  fill="#0038a8"/>
                <rect width="8" height="16" x="8"  fill="#ffffff"/>
                <rect width="8" height="16" x="16" fill="#ee2436"/>
              </svg>
              <span class="abbr">FRA</span>
            </div>
            <div class="rail"></div>
            <div class="score">1</div>
            <div class="events">
              <!-- goal(s) -->
              <div class="ev"><span class="v"><span class="mk goal"></span>69'</span></div>
              <!-- penalty shootout: rings — hollow=scored, filled=missed (illustrative) -->
              <div class="ev shoot">
                <span class="pk scored"></span><span class="pk scored"></span><span class="pk miss"></span><span class="pk scored"></span><span class="pk scored"></span>
              </div>
            </div>
          </div>

        </div>

        <!-- clock -->
        <div class="clock">
          <div class="t">75<em>'</em></div>
          <div class="half">2nd Half</div>
        </div>

      </div>
    </div>

    <!-- merged control + pulse (transparent) — timeline from Direction A -->
    <div class="console">
      <div class="play">
        <svg width="16" height="18" viewBox="0 0 16 18" aria-label="Play">
          <path d="M1 1 L15 9 L1 17 Z" fill="none" stroke="#e9e7f4" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="pulse">
        <svg viewBox="0 0 560 60" preserveAspectRatio="none" aria-label="Match pulse">
          <!-- baseline (clean, from Direction A) -->
          <line x1="0" y1="30" x2="560" y2="30" stroke="rgba(214,208,232,.14)" stroke-width="1"/>
          <!-- full seismograph trace (unplayed = dim) -->
          <path d="M0,30 L14,30 L20,28 L26,32 L34,18 L40,42 L46,30 L58,30 L66,24 L74,36
                   L82,8 L90,52 L98,26 L106,34 L118,30 L128,22 L136,38 L144,16 L152,44
                   L160,29 L172,31 L182,20 L190,40 L198,4 L206,56 L214,28 L222,33 L236,30
                   L248,25 L256,35 L266,14 L274,46 L282,31 L296,29 L308,23 L316,37 L324,11
                   L332,49 L340,27 L350,32 L364,30 L376,26 L386,34 L396,19 L404,41 L414,30
                   L428,31 L440,24 L450,36 L462,28 L474,32 L488,30 L500,27 L512,33 L524,29
                   L536,31 L548,30 L560,30"
                fill="none" stroke="#5a5480" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
          <!-- played segment up to the playhead (~75'/90' ≈ 83%), bright off-white -->
          <path d="M0,30 L14,30 L20,28 L26,32 L34,18 L40,42 L46,30 L58,30 L66,24 L74,36
                   L82,8 L90,52 L98,26 L106,34 L118,30 L128,22 L136,38 L144,16 L152,44
                   L160,29 L172,31 L182,20 L190,40 L198,4 L206,56 L214,28 L222,33 L236,30
                   L248,25 L256,35 L266,14 L274,46 L282,31 L296,29 L308,23 L316,37 L324,11
                   L332,49 L340,27 L350,32 L364,30 L376,26 L386,34 L396,19 L404,41 L414,30
                   L428,31 L440,24 L450,36 L462,28 L466,31"
                fill="none" stroke="#e9e7f4" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <!-- playhead cursor at 75' -->
          <line x1="466" y1="6" x2="466" y2="54" stroke="rgba(233,231,244,.55)" stroke-width="1"/>
          <circle cx="466" cy="31" r="4" fill="#e9e7f4"/>
          <circle cx="466" cy="31" r="8" fill="none" stroke="#e9e7f4" stroke-opacity=".3" stroke-width="1.2"/>
        </svg>
      </div>
    </div>

    <!-- bottom reference strip — credits + data sources, as TEXT (video-safe) -->
    <div class="footstrip">
      <span class="f-name">Alexander Bogachev, Data Visualization Lead</span>
      <span class="f-dot">•</span>

      <span class="f-dot">•</span>
      <span class="f-social"><svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>in/bogachev-aleksandr</span>
      <span class="f-sources"><b>Data:</b> FotMob · WhoScored (Opta)</span>
    </div>
  </div>

  <div class="figref">B2 · Swiss Technical (revised)</div>
</body>
</html>
