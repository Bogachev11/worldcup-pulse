<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>STAGE 3D — France · Senegal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .pnl {
      position: fixed; z-index: 30; pointer-events: auto;
      display: flex; flex-direction: column; gap: 9px;
      background: rgba(10,12,20,0.6); border: 1px solid var(--stroke);
      border-radius: 12px; padding: 12px 14px; width: 264px;
      font-size: 11px; letter-spacing: 0.04em;
    }
    #panel { top: 14px; left: 14px; }
    #campanel { bottom: 14px; left: 14px; }
    .pnl .row { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .pnl label { color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.12em; }
    .pnl input[type=range] { flex: 1; }
    .pnl .val { min-width: 46px; text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); }
    #title2 { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink); }
    #camread { min-width: auto; color: #9fd; letter-spacing: 0.06em; }
    #hud2 {
      position: fixed; top: 14px; right: 14px; z-index: 30;
      text-align: right; font-variant-numeric: tabular-nums; line-height: 1.5;
      background: rgba(10,12,20,0.45); border: 1px solid var(--stroke);
      border-radius: 12px; padding: 10px 14px; font-size: 12px; letter-spacing: 0.06em;
    }
    #hud2 .big { font-size: 26px; font-weight: 200; }
    #hud2 .dim { color: var(--ink-dim); font-size: 11px; letter-spacing: 0.12em; }
    .btn { cursor: pointer; border: 1px solid var(--stroke); background: rgba(255,255,255,0.05);
      color: var(--ink); border-radius: 7px; padding: 5px 10px; font-size: 11px; }
    .btn:hover { border-color: rgba(255,255,255,0.3); }
    .chk { text-transform: none !important; letter-spacing: 0 !important; color: var(--ink) !important; }
    #stage { cursor: grab; }
    #stage.drag { cursor: grabbing; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <!-- data / playback / encoding -->
  <div id="panel" class="pnl">
    <div id="title2">STAGE 3D · loading…</div>
    <div class="row">
      <button id="play" class="btn">❚❚ pause</button>
      <button id="restart" class="btn">↺ restart</button>
    </div>
    <div class="row"><label>clock</label><input id="clock" type="range" min="0" max="100" step="0.1" value="0"><span class="val" id="clockV">0'</span></div>
    <div class="row"><label>speed</label><input id="speed" type="range" min="0.3" max="8" step="0.1" value="2"><span class="val" id="speedV">2.0×</span></div>
    <div class="row"><label>fade time</label><input id="fadet" type="range" min="0.3" max="20" step="0.1" value="3"><span class="val" id="fadetV">3.0m</span></div>
    <div class="row"><label>fade floor</label><input id="fadef" type="range" min="0" max="0.8" step="0.01" value="0.06"><span class="val" id="fadefV">0.06</span></div>
    <div class="row"><label>height Z</label><input id="zscale" type="range" min="0" max="1.6" step="0.02" value="0.8"><span class="val" id="zscaleV">0.80</span></div>
    <div class="row"><label>poss win</label><input id="pwin" type="range" min="1" max="12" step="0.5" value="4"><span class="val" id="pwinV">4m</span></div>
    <div class="row"><label>layers</label>
      <span>
        <label class="chk"><input type="checkbox" id="lPass" checked>pass</label>
        <label class="chk"><input type="checkbox" id="lShot" checked>shot</label>
        <label class="chk"><input type="checkbox" id="lGrid" checked>pitch</label>
      </span>
    </div>
  </div>

  <!-- camera / ракурс (set it, then tell me the values) -->
  <div id="campanel" class="pnl">
    <div class="row"><label>camera ▸ ракурс</label><span class="val" id="camread">—</span></div>
    <div class="row"><label>yaw</label><input id="yaw" type="range" min="0" max="360" step="1" value="45"><span class="val" id="yawV">45°</span></div>
    <div class="row"><label>elev</label><input id="elev" type="range" min="4" max="89" step="1" value="32"><span class="val" id="elevV">32°</span></div>
    <div class="row"><label>zoom</label><input id="zoom" type="range" min="0.4" max="2.4" step="0.02" value="1"><span class="val" id="zoomV">1.00</span></div>
    <div class="row">
      <button id="copycam" class="btn">copy camera</button>
      <button id="resetcam" class="btn">reset</button>
    </div>
    <div class="dim" style="color:var(--ink-dim);font-size:10px">drag on the field to orbit · копни и передай мне числа</div>
  </div>

  <div id="hud2">
    <div class="dim"><span id="hAbbr">FRA</span> vs <span id="aAbbr">SEN</span></div>
    <div class="big"><span id="hScore">0</span> – <span id="aScore">0</span></div>
    <div class="dim"><span id="clk">0'</span></div>
    <div class="dim">poss <span id="hPoss">50</span> – <span id="aPoss">50</span>%</div>
    <div class="dim">xG <span id="hXg">0.00</span> – <span id="aXg">0.00</span></div>
    <div class="dim">pass <span id="hPass">0</span> – <span id="aPass">0</span></div>
  </div>

  <script type="module" src="stage.js"></script>
</body>
</html>
